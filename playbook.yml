---
- name: Deploy Minecraft Server from ECR
  user: ubuntu
  hosts: all
  become: true
  vars:
    # Variables - default values
    aws_region: "us-east-1"
    s3_bucket_name: "ops3-world"
    minecraft_image: "{{ ecr_url }}/{{ ecr_repo_name }}:{{ ecr_image_tag }}"
    world_data_path: "/opt/minecraft/world"
    mount_data_path: "/home/ubuntu/data"
    temp_data_path: "/tmp/restore.tar"
    motd: "wengor-ops3"

  tasks:
    - name: Install Runtime Prerequisites (Docker and AWS CLI)
      apt:
        name:
          - docker.io
          - awscli
        state: present
        update_cache: yes

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create world data directory which will be mounted as a volume
      file:
        path: "{{ mount_data_path }}"
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    - name: Authenticate Docker to ECR using Instance Profile
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_url }}
      changed_when: false

    - name: Pull pinned Minecraft image from ECR
      community.docker.docker_image:
        name: "{{ ecr_url }}:{{ ecr_image_tag }}"
        source: pull

    - name: Pull world data backup from S3
      shell: "aws s3 cp s3://{{ s3_bucket_name }}/backups/backup.tar {{ temp_data_path }}"
      args:
        creates: "{{ temp_data_path }}"

    - name: Extract backup to world data directory
      ansible.builtin.unarchive:
        src: "{{ temp_data_path }}"
        dest: "{{ mount_data_path }}"
        remote_src: yes

    - name: Start Minecraft server container
      community.docker.docker_container:
        name: minecraft-server
        image: "{{ ecr_url }}:{{ ecr_image_tag }}"
        state: started
        restart_policy: always
        published_ports:
          - "25565:25565"
        volumes:
          - "{{ mount_data_path }}{{ world_data_path }}:{{ world_data_path }}:rw"
        env:
          MOTD: "{{ motd }}"
