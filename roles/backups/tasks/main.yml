- name: Pull backup from S3
  shell: "aws s3 cp s3://{{ s3_bucket_name }}/{{ s3_backup_object_path }} {{ temp_backup_path }}"
  args:
    creates: "{{ temp_backup_path }}"

- name: Extract backup to destination
  ansible.builtin.unarchive:
    src: "{{ temp_backup_path }}"
    dest: "{{ data_destination_path }}"
    remote_src: yes
